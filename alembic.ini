[alembic]
script_location = backend/alembic
sqlalchemy.url = postgresql://omniagent:omniagent@db:5432/omniagent

[loggers]
keys = root,sqlalchemy,alembic
level = WARN
handlers = console

[handlers]
keys = console

[formatters]
keys = generic

[handlers]
console.class = StreamHandler
console.args = (sys.stderr,)
console.level = NOTSET
console.formatter = generic

[formatters]
generic.format = %(levelname)-5.5s [%(name)s] %(message)s
generic.datefmt =

